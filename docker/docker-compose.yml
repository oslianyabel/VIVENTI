services:
  telegram-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["uv", "run", "python", "scripts/run_telegram_bot.py"]
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      # Override DATABASE_URL to use the db service name instead of localhost
      DATABASE_URL: postgresql://osliani:ofs@db:5432/viventi
    depends_on:
      db:
        condition: service_healthy
    networks:
      - viventi-net

  whatsapp-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["uv", "run", "uvicorn", "chatbot.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      # Override DATABASE_URL to use the db service name instead of localhost
      DATABASE_URL: postgresql://osliani:ofs@db:5432/viventi
    ports:
      - "8000:8000"
    volumes:
      # Persist uploaded media files (images, voice notes, documents)
      - static_files:/app/static
    depends_on:
      db:
        condition: service_healthy
    networks:
      - viventi-net

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: osliani
      POSTGRES_PASSWORD: ofs
      POSTGRES_DB: viventi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osliani -d viventi"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - viventi-net

volumes:
  postgres_data:
  static_files:

networks:
  viventi-net:
